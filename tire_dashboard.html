<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tire Monitor — Armada</title>
<style>

  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');

  :root {
    --red:      #C0001A;
    --red-dark: #8a0012;
    --red-mid:  #e8001f;
    --blue:     #1E4D9B;
    --blue-lt:  #2a65cc;
    --white:    #FFFFFF;
    --bg:       #F4F5F7;
    --card:     #FFFFFF;
    --border:   #e0e0e8;
    --text:     #2D2D2D;
    --text-dim: #7a7a90;
    --gold:     #c07010;
    --gold-lt:  #e89020;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 0 0 200px;
    overflow-x: hidden;
  }

  /* ===== HEADER BAR (mirip laporan) ===== */
  .header {
    width: 100%;
    background: var(--red);
    padding: 14px 24px 12px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 3px 12px rgba(192,0,26,0.3);
  }

  .header-icon {
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.15);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .header-texts { flex: 1; }

  .title {
    font-size: 10px;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.65);
    text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace;
    line-height: 1;
  }

  .subtitle {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #FFFFFF;
    margin-top: 2px;
  }

  .header-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 2px;
    text-align: right;
    line-height: 1.6;
  }

  /* ============ MAIN LAYOUT ============ */
  .main-layout {
    display: flex;
    gap: 18px;
    align-items: flex-start;
    justify-content: center;
    width: 100%;
    max-width: 780px;
    padding: 0 16px;
  }

  /* ============ TRUCK WRAPPER ============ */
  .truck-wrapper {
    position: relative;
    width: 260px;
    flex-shrink: 0;
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 12px 0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  .truck-svg {
    width: 100%;
    display: block;
    filter: drop-shadow(0 4px 12px rgba(192,0,26,0.12));
  }

  /* ============ TIRE BUTTONS ============ */
  .tire {
    position: absolute;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    background: radial-gradient(circle at 35% 35%, #f0f2f8, #e0e4ee);
    border: 2px solid #c8cce0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    transition: all 0.3s ease;
    z-index: 20;
    transform: translate(-50%, -50%);
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
  }

  .tire::before {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    border: 1px dashed #c8cce0;
    transition: all 0.3s;
  }

  .tire:hover {
    border-color: var(--red);
    background: radial-gradient(circle at 35% 35%, #fff0f2, #ffe0e4);
    box-shadow: 0 0 16px rgba(192,0,26,0.35);
  }
  .tire:hover::before { border-color: var(--red); animation: spin 3s linear infinite; }

  .tire.active {
    border-color: var(--red);
    background: radial-gradient(circle at 35% 35%, #ffe8eb, #ffd0d6);
    box-shadow: 0 0 22px rgba(192,0,26,0.55), 0 0 44px rgba(192,0,26,0.15);
  }
  .tire.active::before { border-color: var(--red); animation: spin 2s linear infinite; }

  /* Ban serep — biru sesuai warna grafik laporan */
  .tire.serep {
    border-color: #a0b0d0;
    background: radial-gradient(circle at 35% 35%, #e8eef8, #d8e2f2);
  }
  .tire.serep:hover {
    border-color: var(--blue);
    background: radial-gradient(circle at 35% 35%, #dce8ff, #ccd8f0);
    box-shadow: 0 0 16px rgba(30,77,155,0.35);
  }
  .tire.serep.active {
    border-color: var(--blue);
    box-shadow: 0 0 22px rgba(30,77,155,0.55);
    background: radial-gradient(circle at 35% 35%, #d0deff, #bccef0);
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .tire-label {
    font-size: 7.5px;
    letter-spacing: 0.4px;
    color: #888aaa;
    text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace;
    line-height: 1.3;
    text-align: center;
    pointer-events: none;
  }
  .tire:hover .tire-label, .tire.active .tire-label { color: var(--red); }
  .tire.serep .tire-label { color: #7a8ab0; }
  .tire.serep:hover .tire-label, .tire.serep.active .tire-label { color: var(--blue); }

  .tire-code {
    font-size: 7px;
    color: var(--red);
    font-family: 'Share Tech Mono', monospace;
    margin-top: 1px;
    pointer-events: none;
    font-weight: 700;
  }
  .tire.serep .tire-code { color: var(--blue); }

  /* ============ LEGEND PANEL (kanan) ============ */
  .legend-panel {
    flex: 1;
    min-width: 200px;
  }

  .legend-title {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    margin-bottom: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }

  .legend-item:hover {
    background: #fff0f2;
    border-color: rgba(192,0,26,0.3);
    box-shadow: 0 2px 8px rgba(192,0,26,0.1);
  }
  .legend-item.active-legend {
    background: #fff0f2;
    border-color: rgba(192,0,26,0.5);
    box-shadow: 0 2px 10px rgba(192,0,26,0.15);
  }
  .legend-item.serep-legend { border-color: rgba(30,77,155,0.12); }
  .legend-item.serep-legend:hover {
    background: #eef2ff;
    border-color: rgba(30,77,155,0.3);
  }
  .legend-item.serep-legend.active-legend {
    background: #e8eeff;
    border-color: rgba(30,77,155,0.5);
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 2px solid #c8cce0;
    flex-shrink: 0;
  }
  .legend-item:hover .legend-dot,
  .active-legend .legend-dot { border-color: var(--red); background: rgba(192,0,26,0.15); }
  .serep-legend .legend-dot { border-color: #a0b0d0; }
  .serep-legend:hover .legend-dot,
  .serep-legend.active-legend .legend-dot { border-color: var(--blue); background: rgba(30,77,155,0.15); }

  .legend-text { flex: 1; }
  .legend-name { font-size: 12px; font-weight: 600; color: var(--text); letter-spacing: 0.3px; }
  .legend-serial { font-size: 9px; font-family: 'Share Tech Mono', monospace; color: var(--text-dim); margin-top: 1px; }
  .active-legend .legend-serial { color: var(--red); }
  .serep-legend.active-legend .legend-serial { color: var(--blue); }

  .legend-status {
    font-size: 9px;
    font-family: 'Share Tech Mono', monospace;
    padding: 2px 7px;
    border-radius: 4px;
    background: rgba(192,0,26,0.08);
    color: var(--red);
    border: 1px solid rgba(192,0,26,0.2);
    font-weight: 700;
  }
  .serep-legend .legend-status {
    background: rgba(30,77,155,0.08);
    color: var(--blue);
    border-color: rgba(30,77,155,0.2);
  }

  /* Overlay backdrop */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.25);
    z-index: 190;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  /* ============ INFO PANEL (slide up) ============ */
  .info-panel {
    position: fixed;
    bottom: -520px;
    left: 50%;
    transform: translateX(-50%);
    width: min(500px, 98vw);
    background: var(--card);
    border: 1px solid var(--border);
    border-top: 3px solid var(--red);
    border-radius: 18px 18px 0 0;
    padding: 18px 18px 24px;
    transition: bottom 0.52s cubic-bezier(0.34, 1.4, 0.64, 1);
    z-index: 200;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.15);
    max-height: 90vh;
    overflow-y: auto;
  }

  .info-panel.visible { bottom: 0; }

  .panel-drag {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 18px;
  }

  .info-panel-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .panel-tag {
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--red);
    font-family: 'Share Tech Mono', monospace;
    text-transform: uppercase;
  }

  .panel-name {
    font-size: 19px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.3px;
    margin-top: 3px;
  }

  .close-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 26px; height: 26px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    position: relative;
    z-index: 300;
    pointer-events: all;
  }
  .close-btn:hover { border-color: var(--red); color: var(--red); }

  .serial-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(192,0,26,0.06);
    border: 1px solid rgba(192,0,26,0.2);
    border-radius: 6px;
    padding: 5px 12px;
    margin-bottom: 16px;
  }
  .serial-badge.serep-badge {
    background: rgba(30,77,155,0.06);
    border-color: rgba(30,77,155,0.2);
  }

  .serial-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--red);
    animation: blink 2s ease-in-out infinite;
  }
  .serep-badge .serial-dot { background: var(--blue); }

  @keyframes blink {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.4; transform:scale(0.7); }
  }

  .serial-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; color: var(--red); letter-spacing: 2px;
  }
  .serep-badge .serial-text { color: var(--blue); }

  .specs-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .spec-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    animation: slideUp 0.35s ease both;
  }
  @keyframes slideUp {
    from { opacity:0; transform:translateY(14px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .spec-label {
    font-size: 8px; letter-spacing: 2px; color: var(--text-dim);
    text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace; margin-bottom: 3px;
  }

  .spec-value { font-size: 14px; font-weight: 700; color: var(--text); }
  .spec-value.hi { color: var(--red); }
  .spec-value.warn { color: #e07000; }

  .pbar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 5px; overflow: hidden; }
  .pfill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--red-dark), var(--red)); transition: width 0.8s ease 0.25s; }
  .pfill.warn { background: linear-gradient(90deg, #c06000, #e08800); }

  /* Legend kondisi dot warna */
  .cond-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 2px;
  }
  .cond-ok   { background: #1a7a40; }
  .cond-warn { background: #cc5500; }
  .cond-crit { background: #C0001A; animation: pulse-dot 1.2s ease-in-out infinite; }
  .cond-blue { background: #1E4D9B; }
  @keyframes pulse-dot {
    0%,100% { transform: scale(1); opacity:1; }
    50%      { transform: scale(1.5); opacity:0.6; }
  }

  .legend-km {
    font-size: 9px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--text-dim);
    margin-top: 2px;
    display: flex; align-items: center; gap: 4px;
  }
  .legend-km span { color: var(--text); font-weight: 600; }

  /* Mini bar kondisi di legend */
  .legend-mini-bar {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 4px;
    overflow: hidden;
  }
  .legend-mini-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }
  .legend-status.warn-status {
    background: rgba(220,80,0,0.08);
    color: #cc4400;
    border-color: rgba(220,80,0,0.25);
  }
  .legend-status.kritis-status {
    background: rgba(192,0,26,0.1);
    color: var(--red);
    border-color: rgba(192,0,26,0.3);
    animation: blink-badge 1.5s ease-in-out infinite;
  }
  /* HUD corners */
  .hud { position:fixed; font-family:'Share Tech Mono',monospace; font-size:9px; color:#c8ccd8; letter-spacing:2px; line-height:1.6; }
  .hud.tl { top:14px; left:14px; }
  .hud.tr { top:14px; right:14px; text-align:right; }

  /* ===================================================
     DASHBOARD — ARMADA PAGE
  =================================================== */
  .page { display: none; width: 100%; flex-direction: column; align-items: center; }
  .page.active { display: flex; }

  /* Search + filter bar */
  .dash-controls {
    width: 100%; max-width: 960px;
    padding: 0 16px;
    display: flex; gap: 10px; align-items: center;
    margin-bottom: 16px; flex-wrap: wrap;
  }
  .search-box {
    flex: 1; min-width: 180px;
    display: flex; align-items: center; gap: 8px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px;
  }
  .search-box input {
    border: none; outline: none; background: transparent;
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    color: var(--text); width: 100%;
  }
  .search-icon { font-size: 14px; color: var(--text-dim); flex-shrink: 0; }

  .filter-btn {
    padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--card); font-family: 'Rajdhani', sans-serif;
    font-size: 12px; font-weight: 600; cursor: pointer;
    color: var(--text-dim); transition: all 0.2s; white-space: nowrap;
  }
  .filter-btn:hover, .filter-btn.active-filter {
    border-color: var(--red); color: var(--red);
    background: rgba(192,0,26,0.05);
  }
  .filter-btn.f-ok.active-filter   { border-color:#1a7a40; color:#1a7a40; background:rgba(26,122,64,0.05); }
  .filter-btn.f-warn.active-filter { border-color:#cc5500; color:#cc5500; background:rgba(204,85,0,0.05); }
  .filter-btn.f-crit.active-filter { border-color:var(--red); color:var(--red); }

  /* Summary strip */
  .summary-strip {
    width: 100%; max-width: 960px;
    padding: 0 16px; margin-bottom: 16px;
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .sum-card {
    flex: 1; min-width: 100px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .sum-num { font-size: 24px; font-weight: 700; }
  .sum-lbl { font-size: 9px; font-family: 'Share Tech Mono', monospace; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .sum-ok   { border-top: 3px solid #1a7a40; }
  .sum-warn { border-top: 3px solid #cc5500; }
  .sum-crit { border-top: 3px solid var(--red); }
  .sum-total{ border-top: 3px solid var(--blue); }
  .sum-ok .sum-num   { color: #1a7a40; }
  .sum-warn .sum-num { color: #cc5500; }
  .sum-crit .sum-num { color: var(--red); }
  .sum-total .sum-num{ color: var(--blue); }

  /* Armada grid */
  .armada-grid {
    width: 100%; max-width: 960px;
    padding: 0 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  /* Kartu kendaraan */
  .vehicle-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.22s;
    box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    position: relative;
    overflow: hidden;
  }
  .vehicle-card::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 4px; height: 100%;
    border-radius: 4px 0 0 4px;
  }
  .vc-ok::before   { background: #1a7a40; }
  .vc-warn::before { background: #cc5500; }
  .vc-crit::before { background: var(--red); animation: pulse-bar 1.5s ease-in-out infinite; }
  @keyframes pulse-bar { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .vehicle-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    border-color: rgba(192,0,26,0.3);
  }

  .vc-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 10px;
  }
  .vc-nopol {
    font-size: 18px; font-weight: 700; letter-spacing: 1px;
    color: var(--text);
  }
  .vc-lambung {
    font-size: 9px; font-family: 'Share Tech Mono', monospace;
    color: var(--text-dim); margin-top: 1px;
  }
  .vc-type-badge {
    font-size: 8px; font-weight: 700;
    font-family: 'Share Tech Mono', monospace;
    padding: 2px 8px; border-radius: 4px;
    background: rgba(30,77,155,0.08);
    color: var(--blue);
    border: 1px solid rgba(30,77,155,0.2);
    flex-shrink: 0;
  }

  /* Grid status ban kecil */
  .vc-tire-grid {
    display: flex; gap: 4px; flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .vc-tire-dot {
    display: flex; flex-direction: column; align-items: center;
    gap: 2px;
  }
  .vc-tire-circle {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid;
    display: flex; align-items: center; justify-content: center;
    font-size: 6px; font-weight: 700;
    font-family: 'Share Tech Mono', monospace;
  }
  .vtc-ok   { border-color:#1a7a40; background:rgba(26,122,64,0.1);  color:#1a7a40; }
  .vtc-warn { border-color:#cc5500; background:rgba(204,85,0,0.1);   color:#cc5500; }
  .vtc-crit { border-color:var(--red); background:rgba(192,0,26,0.1); color:var(--red); animation: pulse-dot 1.2s ease-in-out infinite; }
  .vtc-serep{ border-color:var(--blue); background:rgba(30,77,155,0.1); color:var(--blue); border-style: dashed; }
  .vc-tire-lbl {
    font-size: 6px; font-family: 'Share Tech Mono', monospace;
    color: var(--text-dim); text-align: center; line-height: 1.1;
  }

  .vc-bottom {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 8px; border-top: 1px solid var(--border);
  }
  .vc-date { font-size: 9px; font-family: 'Share Tech Mono', monospace; color: var(--text-dim); }
  .vc-status-badge {
    font-size: 9px; font-weight: 700;
    font-family: 'Share Tech Mono', monospace;
    padding: 3px 10px; border-radius: 4px;
  }
  .vsb-ok   { background:rgba(26,122,64,0.1);  color:#1a7a40; border:1px solid rgba(26,122,64,0.25); }
  .vsb-warn { background:rgba(204,85,0,0.1);   color:#cc5500; border:1px solid rgba(204,85,0,0.25); }
  .vsb-crit { background:rgba(192,0,26,0.1);   color:var(--red); border:1px solid rgba(192,0,26,0.3); animation:blink-badge 1.5s ease-in-out infinite; }

  /* ===================================================
     DETAIL PAGE
  =================================================== */
  .back-btn {
    display: flex; align-items: center; gap: 8px;
    background: none; border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 14px;
    font-family: 'Rajdhani', sans-serif; font-size: 13px;
    font-weight: 600; color: var(--text-dim);
    cursor: pointer; transition: all 0.2s;
    margin: 0 16px 16px;
    align-self: flex-start;
  }
  .back-btn:hover { border-color: var(--red); color: var(--red); }

  .detail-vehicle-info {
    width: 100%; max-width: 780px;
    padding: 0 16px; margin-bottom: 12px;

<script>
// ============================================================
// DATA ARMADA — diisi otomatis dari Google Sheets
// ============================================================
const armadaData = [];

// ============================================================
// HELPERS
// ============================================================
function avg(arr) { return arr.reduce((a,b)=>a+b,0)/arr.length; }
function kondisi(mm) {
  if (mm >= 6)  return 'ok';
  if (mm >= 3)  return 'warn';
  return 'crit';
}
function kondisiColor(mm) {
  if (mm >= 6)  return { stroke:'#1a7a40', fill:'rgba(26,122,64,0.12)', text:'#1a7a40', bar:'linear-gradient(90deg,#1a5a30,#2db060)' };
  if (mm >= 3)  return { stroke:'#cc5500', fill:'rgba(204,85,0,0.12)',  text:'#cc5500', bar:'linear-gradient(90deg,#994400,#dd6600)' };
  return              { stroke:'#C0001A', fill:'rgba(192,0,26,0.12)', text:'#C0001A', bar:'linear-gradient(90deg,#8a0012,#C0001A)' };
}
function kondisiLabel(mm) {
  if (mm >= 6) return '✓ BAIK';
  if (mm >= 3) return '⚡ TIPIS';
  return '⚠ KRITIS';
}
function vcWorstKondisi(vehicle) {
  let worst = 'ok';
  Object.values(vehicle.ban).forEach(b => {
    if (b.serep) return;
    const k = kondisi(avg(b.tebal));
    if (k === 'crit') worst = 'crit';
    else if (k === 'warn' && worst !== 'crit') worst = 'warn';
  });
  return worst;
}

// ============================================================
// DASHBOARD — build armada cards
// ============================================================
let currentFilter = 'all';

function buildSummary() {
  let total=0, ok=0, warn=0, crit=0;
  armadaData.forEach(v => {
    total++;
    const w = vcWorstKondisi(v);
    if (w==='ok') ok++;
    else if (w==='warn') warn++;
    else crit++;
  });
  document.getElementById('summaryStrip').innerHTML = `
    <div class="sum-card sum-total"><div class="sum-num">${total}</div><div class="sum-lbl">Total Kendaraan</div></div>
    <div class="sum-card sum-ok">  <div class="sum-num">${ok}</div>  <div class="sum-lbl">✓ Semua Baik</div></div>
    <div class="sum-card sum-warn"><div class="sum-num">${warn}</div><div class="sum-lbl">⚡ Perlu Monitor</div></div>
    <div class="sum-card sum-crit"><div class="sum-num">${crit}</div><div class="sum-lbl">⚠ Kritis / Segera</div></div>`;
}

function buildCard(v) {
  const worst = vcWorstKondisi(v);
  const banList = Object.values(v.ban);

  // Mini tire dots
  let dotsHtml = '';
  banList.forEach(b => {
    const a = avg(b.tebal);
    let cls = b.serep ? 'vtc-serep' : (kondisi(a)==='ok' ? 'vtc-ok' : kondisi(a)==='warn' ? 'vtc-warn' : 'vtc-crit');
    dotsHtml += `
      <div class="vc-tire-dot">
        <div class="vc-tire-circle ${cls}">${b.kode}</div>
        <div class="vc-tire-lbl">${b.serep?'SP':a.toFixed(1)}</div>
      </div>`;
  });

  const statusBadge = worst==='ok'
    ? `<div class="vc-status-badge vsb-ok">✓ BAIK</div>`
    : worst==='warn'
    ? `<div class="vc-status-badge vsb-warn">⚡ MONITOR</div>`
    : `<div class="vc-status-badge vsb-crit">⚠ KRITIS</div>`;

  return `
    <div class="vehicle-card vc-${worst}" onclick="openDetail('${v.nopol}')">
      <div class="vc-top">
        <div>
          <div class="vc-nopol">${v.nopol}</div>
          <div class="vc-lambung">NO. LAMBUNG: ${v.lambung}</div>
        </div>
        <div class="vc-type-badge">${v.tipe.toUpperCase()}</div>
      </div>
      <div class="vc-tire-grid">${dotsHtml}</div>
      <div class="vc-bottom">
        <div class="vc-date">📅 ${v.tglPeriksa}</div>
        ${statusBadge}
      </div>
    </div>`;
}

function renderCards(data) {
  document.getElementById('armadaGrid').innerHTML = data.length
    ? data.map(buildCard).join('')
    : `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-dim);font-family:monospace">Tidak ada kendaraan ditemukan</div>`;
}

function setFilter(f) {
  currentFilter = f;
  ['All','Ok','Warn','Crit'].forEach(x =>
    document.getElementById('f'+x).classList.toggle('active-filter', f===x.toLowerCase()));
  applyFilter();
}

function applyFilter() {
  const q = (document.getElementById('searchInput').value||'').toLowerCase();
  let data = armadaData.filter(v => {
    const matchQ = !q || v.nopol.toLowerCase().includes(q) || v.lambung.toLowerCase().includes(q);
    const w = vcWorstKondisi(v);
    const matchF = currentFilter==='all' || w===currentFilter;
    return matchQ && matchF;
  });
  renderCards(data);
}
function filterCards() { applyFilter(); }

// ============================================================
// DETAIL PAGE — truck diagram + ban interaction
// ============================================================
let activeVehicle = null;
let activeTireId  = null;

function openDetail(nopol) {
  activeVehicle = armadaData.find(v => v.nopol === nopol);
  if (!activeVehicle) return;

  // Update header
  document.getElementById('headerTitle').textContent = `// DETAIL BAN — ${nopol}`;
  document.getElementById('headerSubtitle').textContent = activeVehicle.tipe === 'tronton' ? 'TRUK TRONTON' : 'TRUK ENGKEL';
  document.getElementById('headerBadge').innerHTML = `NOPOL: ${nopol}<br>LAMBUNG: ${activeVehicle.lambung} &nbsp;|&nbsp; TGL: ${activeVehicle.tglPeriksa}`;
  document.getElementById('detailNopol').textContent = nopol;
  document.getElementById('detailMeta').textContent = `NO. LAMBUNG: ${activeVehicle.lambung} \u00a0|\u00a0 TIPE: ${activeVehicle.tipe.toUpperCase()} \u00a0|\u00a0 TGL: ${activeVehicle.tglPeriksa} \u00a0|\u00a0 KM: ${activeVehicle.km.toLocaleString('id-ID')}`;

  // Build tire buttons dynamically
  buildTireButtons(activeVehicle);
  // Build legend
  buildLegend(activeVehicle);

  // Switch page
  document.getElementById('pageDashboard').classList.remove('active');
  document.getElementById('pageDetail').classList.add('active');
  window.scrollTo(0,0);
}

function goBack() {
  closePanel();
  document.getElementById('pageDetail').classList.remove('active');
  document.getElementById('pageDashboard').classList.add('active');
  document.getElementById('headerTitle').textContent = '// MONITORING BAN ARMADA';
  document.getElementById('headerSubtitle').textContent = 'REKAP KONDISI BAN KENDARAAN';
  document.getElementById('headerBadge').innerHTML = 'PT YUDA TRANSPORT<br>SISTEM MONITOR BAN';
  activeVehicle = null;
}

// Posisi tire buttons: engkel dan tronton berbeda
const tirePosEngkel = {
  fl:  { left:'16.2%', top:'19.6%', label:'DEPAN\nKIRI' },
  fr:  { left:'83.8%', top:'19.6%', label:'DEPAN\nKANAN' },
  rlo: { left:'7.7%',  top:'73.5%', label:'EKL\nLUAR' },
  rli: { left:'22.3%', top:'73.5%', label:'EKL\nDLM' },
  rri: { left:'77.7%', top:'73.5%', label:'EKN\nDLM' },
  rro: { left:'92.3%', top:'73.5%', label:'EKN\nLUAR' },
  sp:  { left:'50%',   top:'93.2%', label:'BAN\nSEREP' },
};
const tirePosTrionton = {
  fl:   { left:'16.2%', top:'19.6%', label:'DEPAN\nKIRI' },
  fr:   { left:'83.8%', top:'19.6%', label:'DEPAN\nKANAN' },
  rllo: { left:'7%',    top:'60%',   label:'BLK\nKL1' },
  rlli: { left:'22%',   top:'60%',   label:'BLK\nKD1' },
  rrli: { left:'22%',   top:'78%',   label:'BLK\nKD2' },
  rrlo: { left:'7%',    top:'78%',   label:'BLK\nKL2' },
  rrio: { left:'93%',   top:'60%',   label:'BLK\nKO' },
  rrii: { left:'78%',   top:'60%',   label:'BLK\nKI' },
  sp:   { left:'50%',   top:'93.2%', label:'BAN\nSEREP' },
};

function buildTireButtons(vehicle) {
  const posMap = vehicle.tipe === 'tronton' ? tirePosTrionton : tirePosEngkel;
  const wrap = document.getElementById('tireBtns');
  wrap.innerHTML = '';
  Object.entries(vehicle.ban).forEach(([id, ban]) => {
    const pos = posMap[id]; if (!pos) return;
    const a = avg(ban.tebal);
    const k = ban.serep ? 'serep' : kondisi(a);
    const lines = pos.label.split('\n');
    const div = document.createElement('div');
    div.className = 'tire' + (ban.serep ? ' serep' : '');
    div.id = 'tire-' + id;
    div.style.cssText = `left:${pos.left};top:${pos.top}`;
    div.onclick = () => showInfo(id);
    div.innerHTML = `<div class="tire-label">${lines[0]}<br>${lines[1]||''}</div><div class="tire-code">${ban.kode}</div>`;
    wrap.appendChild(div);
  });
}

function buildLegend(vehicle) {
  const container = document.getElementById('legendList');
  container.innerHTML = '';
  Object.entries(vehicle.ban).forEach(([id, ban]) => {
    const a = avg(ban.tebal);
    const k = ban.serep ? 'blue' : kondisi(a) === 'ok' ? 'ok' : kondisi(a) === 'warn' ? 'warn' : 'crit';
    const barColor = ban.serep ? '#1E4D9B' : kondisiColor(a).stroke;
    const statusText = ban.serep ? 'SEREP' : (k==='ok' ? '✓ BAIK' : k==='warn' ? '⚡ TIPIS' : '⚠ KRITIS');
    const statusStyle = ban.serep
      ? 'background:rgba(30,77,155,0.08);color:#1E4D9B;border:1px solid rgba(30,77,155,0.2)'
      : k==='ok'   ? 'background:rgba(26,122,64,0.08);color:#1a7a40;border:1px solid rgba(26,122,64,0.25)'
      : k==='warn' ? 'background:rgba(204,85,0,0.08);color:#cc5500;border:1px solid rgba(204,85,0,0.25)'
      : 'background:rgba(192,0,26,0.08);color:#C0001A;border:1px solid rgba(192,0,26,0.3)';

    const item = document.createElement('div');
    item.className = 'legend-item' + (ban.serep ? ' serep-legend' : '');
    item.id = 'leg-' + id;
    item.onclick = () => showInfo(id);
    item.innerHTML = `
      <div class="cond-dot cond-${k}"></div>
      <div class="legend-text" style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
          <div class="legend-name">${ban.posisi}</div>
          <div style="${statusStyle};font-size:8px;padding:1px 6px;border-radius:3px;font-family:monospace;font-weight:700;flex-shrink:0">${statusText}</div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:1px">
          <div class="legend-serial">${ban.sn}</div>
          <div style="font-size:8px;color:#aaa;font-family:monospace">${ban.serep ? '—' : a.toFixed(2)+' mm'}</div>
        </div>
        <div class="legend-mini-bar">
          <div class="legend-mini-fill" style="width:0;background:${barColor};transition:width 0.6s ease" data-w="${Math.round((a/15)*100)}"></div>
        </div>
      </div>`;
    container.appendChild(item);
  });
  setTimeout(() => {
    document.querySelectorAll('.legend-mini-fill').forEach(el => el.style.width = el.dataset.w + '%');
  }, 300);
}

// TREAD SVG + SHOW INFO (dari truck_v4, disesuaikan)
// ============================================================


// ── warna berdasarkan nilai mm ──────────────────────────────

function kondisiBgClass(mm) {
  if (mm >= 6) return 'rgba(26,122,64,0.07)';
  if (mm >= 3) return 'rgba(204,85,0,0.07)';
  return 'rgba(192,0,26,0.08)';
}
function kondisiBorder(mm) {
  if (mm >= 6) return 'rgba(26,122,64,0.2)';
  if (mm >= 3) return 'rgba(204,85,0,0.2)';
  return 'rgba(192,0,26,0.2)';
}

// ── buat SVG penampang tread ────────────────────────────────
// Konsep yang benar:
//   - Semua alur zigzag SAMA DALAM dari bawah (carcass)
//   - Yang berbeda adalah PERMUKAAN atas ban — semakin aus = permukaan lebih rendah
//   - Ketebalan I,II,III,IV = jarak dari DASAR alur ke PERMUKAAN di area tsb
//   - Ban baru  → permukaan tinggi (jauh dari carcass)
//   - Ban aus   → permukaan rendah (dekat carcass), tidak rata antar titik
function buildTreadSVG(vals, isSerep) {
  const W = 148, H = 175;
  const MAX_MM  = 15;     // ban baru = 15mm
  const CARC_Y  = 130;    // y posisi carcass (tetap)
  const GROOVE_D = 7;     // kedalaman alur zigzag dari permukaan (px, tetap semua alur)
  // Skala: 15mm = 90px ruang tread (dari y=30 sampai y=120 saat baru)
  const SCALE   = 6;      // px per mm — 1mm beda = 6px di layar

  const grooveX = [28, 56, 88, 116];
  const grooveW = 9;

  // surfaceY[i] = posisi y permukaan di alur ke-i
  // Makin kecil y = makin tinggi = ban lebih tebal
  // Clamp agar tidak melampaui carcass
  const surfaceY = vals.map(v => {
    const y = CARC_Y - v * SCALE;
    return Math.max(y, CARC_Y - MAX_MM * SCALE); // tidak boleh lebih tinggi dari ban baru
  });

  const edgeL = surfaceY[0];
  const edgeR = surfaceY[3];

  // Kontur permukaan — tambah titik interpolasi halus antara tiap groove
  // agar transisi tidak terlihat patah, lebih natural seperti ban aus asli
  const surfPts = [
    [4,                                   edgeL],
    [grooveX[0] - grooveW/2,              surfaceY[0]],
    [(grooveX[0] + grooveX[1]) / 2,       (surfaceY[0] + surfaceY[1]) / 2],
    [grooveX[1] - grooveW/2,              surfaceY[1]],
    [(grooveX[1] + grooveX[2]) / 2,       (surfaceY[1] + surfaceY[2]) / 2],
    [grooveX[2] - grooveW/2,              surfaceY[2]],
    [(grooveX[2] + grooveX[3]) / 2,       (surfaceY[2] + surfaceY[3]) / 2],
    [grooveX[3] - grooveW/2,              surfaceY[3]],
    [grooveX[3] + grooveW/2,              surfaceY[3]],
    [W-4,                                 edgeR],
  ];

  let svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;

  // ── Defs: arrow markers ──
  svg += `<defs>`;
  vals.forEach((v, i) => {
    const c = isSerep ? '#1E4D9B' : kondisiColor(v).stroke;
    svg += `
      <marker id="aUp${i}" markerWidth="5" markerHeight="5" refX="2.5" refY="2.5" orient="auto-start-reverse">
        <path d="M0,0 L5,2.5 L0,5 Z" fill="${c}"/>
      </marker>
      <marker id="aDn${i}" markerWidth="5" markerHeight="5" refX="2.5" refY="2.5" orient="auto">
        <path d="M0,0 L5,2.5 L0,5 Z" fill="${c}"/>
      </marker>`;
  });
  svg += `</defs>`;

  // ── Carcass (tetap di bawah) ──
  svg += `<rect x="4" y="${CARC_Y}"    width="${W-8}" height="13" rx="3" fill="#555"/>`;
  svg += `<rect x="4" y="${CARC_Y+13}" width="${W-8}" height="5"  rx="2" fill="#888" opacity="0.25"/>`;
  svg += `<text x="${W/2}" y="${CARC_Y+25}" text-anchor="middle" font-size="7" fill="#777" font-family="monospace">CARCASS</text>`;

  // ── Badan tread (karet) — kontur atas mengikuti keausan ──
  let treadPath = `M4,${CARC_Y} L4,${edgeL}`;
  surfPts.slice(1).forEach(pt => {
    treadPath += ` L${pt[0].toFixed(1)},${pt[1].toFixed(1)}`;
  });
  treadPath += ` L${W-4},${CARC_Y} Z`;
  svg += `<path d="${treadPath}" fill="#2e2e2e"/>`;

  // ── Garis referensi ban baru (15mm) — sangat tipis, tidak mencolok ──
  const newSurfY = CARC_Y - MAX_MM * SCALE;
  svg += `<line x1="4" y1="${newSurfY}" x2="${W-4}" y2="${newSurfY}"
    stroke="#666" stroke-width="0.6" stroke-dasharray="3,4" opacity="0.35"/>`;
  svg += `<text x="6" y="${newSurfY-2}" font-size="5.5" fill="#666" font-family="monospace" opacity="0.5">15mm (baru)</text>`;

  // ── Alur zigzag — kedalaman sama dari permukaan masing-masing ──
  grooveX.forEach((cx, i) => {
    const sy   = surfaceY[i];
    const botY = sy + GROOVE_D;
    const x1   = cx - grooveW/2;
    const x2   = cx + grooveW/2;

    // Trapezoid groove
    svg += `<polygon points="${x1},${sy} ${x2},${sy} ${cx+2},${botY} ${cx-2},${botY}" fill="#0d0d0d"/>`;

    // Pola zigzag dalam groove
    const steps = 3;
    let p1 = `${x1},${sy}`, p2 = `${x2},${sy}`;
    for (let s = 1; s <= steps; s++) {
      const y   = sy + (GROOVE_D / steps) * s;
      const off = (s % 2 === 0) ? 2 : -2;
      p1 += ` ${cx+off-2},${y}`;
      p2 += ` ${cx+off+2},${y}`;
    }
    svg += `<polyline points="${p1}" fill="none" stroke="#111" stroke-width="0.8"/>`;
    svg += `<polyline points="${p2}" fill="none" stroke="#111" stroke-width="0.8"/>`;
  });

  // ── Panah pengukuran + label (dari permukaan ke carcass) ──
  const arrowX = [10, 40, 72, 103];
  vals.forEach((v, i) => {
    const c     = isSerep ? '#1E4D9B' : kondisiColor(v).stroke;
    const ax    = arrowX[i];
    const sy    = surfaceY[i];
    const ey    = CARC_Y - 2;
    const midY  = (sy + ey) / 2;
    const roman = ['I','II','III','IV'][i];
    const bw    = roman.length > 1 ? 16 : 13;

    // Panah double-ended
    svg += `<line x1="${ax}" y1="${sy+2}" x2="${ax}" y2="${ey}"
      stroke="${c}" stroke-width="1.2" opacity="0.9"
      marker-start="url(#aUp${i})" marker-end="url(#aDn${i})"/>`;

    // Badge label di tengah panah
    svg += `<rect x="${ax-bw/2}" y="${midY-6}" width="${bw}" height="12" rx="2" fill="${c}"/>`;
    svg += `<text x="${ax}" y="${midY+3}" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold" font-family="monospace">${roman}</text>`;

    // Nilai mm tepat di atas permukaan alur
    svg += `<text x="${grooveX[i]}" y="${sy-4}" text-anchor="middle" font-size="7" fill="${c}" font-weight="bold" font-family="monospace">${v.toFixed(2)}</text>`;
  });

  // ── Label atas ──
  svg += `<text x="${W/2}" y="10" text-anchor="middle" font-size="7" fill="#aaa" font-family="monospace">PERMUKAAN BAN (TREAD)</text>`;

  // ── Overlay warning jika kritis ──
  const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
  if (avg < 3 && !isSerep) {
    svg += `<text x="${W/2}" y="${(newSurfY+CARC_Y)/2+10}" text-anchor="middle" font-size="20" fill="rgba(192,0,26,0.15)">⚠</text>`;
  }

  svg += `</svg>`;
  return svg;
}
function showInfo(id) {
  if (!activeVehicle) return;
  const ban = activeVehicle.ban[id];
  if (!ban) return;

  activeTireId = id;
  document.querySelectorAll('.tire').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.legend-item').forEach(l => l.classList.remove('active-legend'));
  const tireEl = document.getElementById('tire-' + id);
  const legEl  = document.getElementById('leg-' + id);
  if (tireEl) tireEl.classList.add('active');
  if (legEl)  legEl.classList.add('active-legend');

  const a = avg(ban.tebal);
  const c = ban.serep ? {stroke:'#1E4D9B'} : kondisiColor(a);

  document.getElementById('panelTag').textContent    = `// ${ban.posisi.toUpperCase()}`;
  document.getElementById('panelName').textContent   = `${ban.merk === 'BS' ? 'Bridgestone' : ban.merk === 'MH' ? 'Michelin' : ban.merk === 'GY' ? 'Goodyear' : ban.merk} — ${ban.serep ? 'BAN SEREP' : 'BAN AKTIF'}`;
  document.getElementById('panelSerial').textContent = `SN: ${ban.sn}`;

  const badge = document.getElementById('serialBadge');
  badge.className = 'serial-badge' + (ban.serep ? ' serep-badge' : '');

  // Specs grid — non-tread specs
  const specs = [
    { label:'SIZE / PATTERN', value: ban.size },
    { label:'MERK',           value: ban.merk === 'BS' ? 'Bridgestone' : ban.merk === 'MH' ? 'Michelin' : ban.merk === 'GY' ? 'Goodyear' : ban.merk },
    { label:'TAHUN',          value: ban.thn },
    { label:'No. SJT',        value: ban.sjt },
    { label:'KM TEMPUH',      value: ban.serep ? '— (cadangan)' : ban.km.toLocaleString('id-ID') + ' km' },
  ];
  document.getElementById('specsGrid').innerHTML = specs.map((s,i) => `
    <div class="spec-item" style="animation-delay:${i*0.05}s">
      <div class="spec-label">${s.label}</div>
      <div class="spec-value">${s.value}</div>
    </div>`).join('');

  // Tread SVG
  document.getElementById('treadSvgWrap').innerHTML = buildTreadSVG(ban.tebal, ban.serep);

  // Bars
  const romans = ['I','II','III','IV'];
  document.getElementById('treadBars').innerHTML = ban.tebal.map((v, i) => {
    const col = ban.serep ? kondisiColor(15) : kondisiColor(v);
    const pct = Math.min(100, Math.round((v / 15) * 100));
    return `
      <div style="animation:slideUp 0.3s ease ${i*0.06}s both">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
          <span style="font-size:9px;font-family:monospace;color:${col.stroke};font-weight:700">Titik ${romans[i]}</span>
          <span style="font-size:11px;font-weight:700;color:${col.stroke}">${v.toFixed(2)} mm</span>
        </div>
        <div style="height:5px;background:var(--border);border-radius:3px;overflow:hidden">
          <div style="height:100%;width:0;background:${col.bar};border-radius:3px;transition:width 0.7s ease ${0.2+i*0.07}s" data-w="${pct}"></div>
        </div>
      </div>`;
  }).join('');

  // Avg row
  const avgVal = avg(ban.tebal);
  const col = ban.serep ? {stroke:'#1E4D9B', fill:'rgba(30,77,155,0.08)'} : kondisiColor(avgVal);
  const pct = Math.min(100, Math.round((avgVal/15)*100));
  document.getElementById('avgRow').innerHTML = `
    <div style="background:${col.fill};border:1px solid ${col.stroke}33;border-radius:10px;padding:10px 14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
        <span style="font-size:9px;font-family:monospace;letter-spacing:2px;color:${col.stroke}">RATA-RATA KETEBALAN</span>
        <span style="font-size:16px;font-weight:700;color:${col.stroke}">${avgVal.toFixed(2)} mm</span>
      </div>
      <div style="height:6px;background:rgba(0,0,0,0.08);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:0;background:${col.bar||col.stroke};border-radius:3px;transition:width 0.8s ease 0.3s" data-w="${pct}"></div>
      </div>
      <div style="margin-top:5px;font-size:9px;font-family:monospace;color:${col.stroke};text-align:right">
        ${ban.serep ? 'CADANGAN' : kondisiLabel(avgVal)} &nbsp;|&nbsp; ${pct}% sisa
      </div>
    </div>`;

  document.getElementById('overlay').classList.add('visible');
  document.getElementById('infoPanel').classList.add('visible');

  setTimeout(() => {
    document.querySelectorAll('#treadBars [data-w], #avgRow [data-w]').forEach(el => el.style.width = el.dataset.w + '%');
  }, 100);
}

const API_URL = "https://script.google.com/macros/s/AKfycbzIv9L-VqCxsgsu-SlUPpHdje8dcu6CsqQpUcuRco90-oMz0H1_lLcY_-o1UksQHkAA/exec";

function parseCSV(text) {
  const lines = text.trim().split('\n');
  // Auto-detect separator: tab atau koma
  const sep = lines[0].includes('\t') ? '\t' : ',';
  const headers = lines[0].split(sep).map(h => h.trim().replace(/^"|"$/g,'').trim());
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = line.split(sep).map(v => v.trim().replace(/^"|"$/g,'').trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] || '');
    return obj;
  });
}

function buildArmadaFromSheets(kRows, bRows) {
  const posMap = {
    FL:   'Depan Kiri',          FR:   'Depan Kanan',
    RLO:  'Engkel Kiri Luar',    RLI:  'Engkel Kiri Dalam',
    RRI:  'Engkel Kanan Dalam',  RRO:  'Engkel Kanan Luar',
    RLL:  'Blk Kiri Luar 1',     RLD:  'Blk Kiri Dalam 1',
    RLD2: 'Blk Kiri Dalam 2',    RLL2: 'Blk Kiri Luar 2',
    SP:   'Ban Serep',
  };
  function formatTgl(raw) {
    if (!raw) return '-';
    // Jika sudah format DD-MM-YYYY, pakai langsung
    if (/^\d{2}-\d{2}-\d{4}$/.test(raw)) return raw;
    // Jika format panjang dari Apps Script (Date object string)
    try {
      const d = new Date(raw);
      if (!isNaN(d)) {
        const dd = String(d.getDate()).padStart(2,'0');
        const mm = String(d.getMonth()+1).padStart(2,'0');
        const yy = d.getFullYear();
        return dd + '-' + mm + '-' + yy;
      }
    } catch(e) {}
    return raw;
  }
  return kRows.map(k => {
    const nopol = (k.NOPOL || '').trim();
    const ban = {};
    bRows.filter(b => (b.NOPOL || '').trim() === nopol).forEach(b => {
      const kode = (b.POSISI_KODE || '').trim();
      if (!kode) return;
      const srepVal = (b.SEREP || '').toString().toLowerCase().trim();
      ban[kode.toLowerCase()] = {
        posisi: b.POSISI_NAMA || posMap[kode] || kode,
        kode,
        serep:  srepVal === 'true',
        tebal:  [
          parseFloat(b.TEBAL_I)   || 0,
          parseFloat(b.TEBAL_II)  || 0,
          parseFloat(b.TEBAL_III) || 0,
          parseFloat(b.TEBAL_IV)  || 0,
        ],
        sn:   b.NO_SERI  || '-',
        merk: b.MERK     || 'BS',
        thn:  b.TAHUN    || '-',
        sjt:  b.NO_SJT   || '-',
        size: b.UKURAN   || '10.00-20',
        km:   parseInt(b.KM_BAN) || 0,
      };
    });
    return {
      nopol,
      lambung:    k.LAMBUNG     || '-',
      tipe:       (k.TIPE || 'engkel').toLowerCase(),
      tglPeriksa: formatTgl(k.TGL_PERIKSA),
      km:         parseInt(k.KM) || 0,
      ban,
    };
  });
}

// Load data via JSONP (bypass CORS)
window.__tire_callback__ = function(data) {
  console.log('Data diterima:', data);
  const kRows = data.kendaraan;
  const bRows = data.bandata;
  const armada = buildArmadaFromSheets(kRows, bRows);
  armadaData.length = 0;
  armada.forEach(d => armadaData.push(d));
  buildSummary();
  renderCards(armadaData);
};

function loadData() {
  document.getElementById('armadaGrid').innerHTML =
    '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-dim);font-family:monospace">\u23F3 Memuat data armada...</div>';
  buildSummary();
  const script = document.createElement('script');
  script.src = API_URL + '?callback=__tire_callback__';
  script.onerror = function() {
    document.getElementById('armadaGrid').innerHTML =
      '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--red);font-family:monospace">\u26A0 Gagal memuat data. Coba refresh halaman.</div>';
  };
  document.head.appendChild(script);
}

document.addEventListener('DOMContentLoaded', loadData);
